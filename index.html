<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nation Info</title>
    <link rel="stylesheet" href="./src/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>

<body>
    <header>
        <div class="container">
            <h1>Nation Info</h1>
            <button id="theme-toggle">
                <i class="fa-regular fa-moon"></i>
                <span>Dark Mode</span>
            </button>
        </div>
    </header>

    <main>
        <div class="container controls-container">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-input" placeholder="Search for a country...">
            </div>

            <div class="filter-wrapper">
                <select id="region-filter">
                    <option value="" selected disabled hidden>Filter by Region</option>
                    <option value="Africa">Africa</option>
                    <option value="Americas">Americas</option>
                    <option value="Asia">Asia</option>
                    <option value="Europe">Europe</option>
                    <option value="Oceania">Oceania</option>
                    <option value="">All</option>
                </select>
            </div>
        </div>

        <div class="container" id="countries-grid">
            <div class="loading">Loading countries...</div>
        </div>

        <div id="detail-modal" class="modal hidden">
            <button id="back-btn" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back</button>
            <div class="modal-content" id="modal-content">
            </div>
        </div>
    </main>

    <script type="module" src="./src/app.js"></script>
</body>

</html>
